<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
      <link rel="icon" type="image/png" href="/assets/images/favicon.jpg">
<link rel="apple-touch-icon" href="/assets/images/favicon.jpg">
<link rel="stylesheet" href="/assets/css/output.css">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>body { font-family: 'Outfit', sans-serif; }</style>
</head>
<body>
    
<!-- LOGIN PAGE -->
<section class="bg-white dark:bg-slate-950 min-h-screen">

    <div class="grid lg:grid-cols-2 min-h-screen">

        <!-- Left Premium Showcase -->
        <div class="relative hidden lg:block overflow-hidden">

            <img
                src="https://images.unsplash.com/photo-1484154218962-a197022b5858"
                alt="Luxury Organized Home"
                class="absolute inset-0 w-full h-full object-cover">

            <div class="absolute inset-0
                        bg-gradient-to-r
                        from-slate-950/90
                        via-violet-950/70
                        to-transparent">
            </div>

            <div class="relative z-10 h-full flex flex-col justify-between p-14">

                <span class="inline-flex
                             px-4 py-2
                             rounded-full
                             bg-white/10
                             backdrop-blur-xl
                             border border-white/10
                             text-white
                             text-sm w-fit">

                    Premium Client Portal

                </span>

                <div>

                    <h1 class="text-6xl font-black text-white leading-tight">

                        Organize,

                        <span class="bg-gradient-to-r
                                     from-violet-500
                                     via-purple-500
                                     to-fuchsia-500
                                     bg-clip-text
                                     text-transparent">

                            Simplify,
                            Transform

                        </span>

                    </h1>

                    <p class="mt-6 text-xl text-white/80 max-w-lg">

                        Manage consultations,
                        track projects, review plans,
                        and access your dashboard.

                    </p>

                </div>

                <div class="flex gap-10">

                    <div>
                        <h3 class="text-4xl font-black text-white">
                            5K+
                        </h3>
                        <p class="text-white/60">
                            Happy Clients
                        </p>
                    </div>

                    <div>
                        <h3 class="text-4xl font-black text-white">
                            98%
                        </h3>
                        <p class="text-white/60">
                            Satisfaction
                        </p>
                    </div>

                </div>

            </div>

        </div>

        <!-- Right Login -->
        <div class="relative flex items-center justify-center p-8">

            <!-- Glow -->
            <div class="absolute
                        w-96 h-96
                        bg-violet-500/20
                        blur-3xl
                        rounded-full">
            </div>

            <div class="relative w-full max-w-md">

                <!-- Glass Card -->
                <div class="backdrop-blur-2xl
                            bg-white/90
                            dark:bg-slate-900/80
                            border border-slate-200
                            dark:border-white/10
                            rounded-[36px]
                            p-10
                            shadow-2xl">

                    <!-- Logo -->
                    <a href="#"
                       class="flex items-center gap-3">

                        <div class="w-10 h-10
                                    rounded-xl
                                    bg-violet-600
                                    text-white
                                    flex items-center justify-center
                                    font-bold">

                            H

                        </div>

                        <span class="font-bold
                                     text-violet-700
                                     dark:text-white">

                            Home Organizer

                        </span>

                    </a>

                    <!-- Heading -->
                    <h2 class="mt-8 text-4xl font-black
                               text-slate-900
                               dark:text-white">

                        Welcome Back

                    </h2>

                    <p class="mt-3
                              text-slate-600
                              dark:text-slate-400">

                        Sign in to continue to your account

                    </p>

                    <!-- Form -->
                  <form action="dashboard.html" method="get" class="mt-10 space-y-5">

                        <!-- Email -->
                        <input
                            type="email"
                            placeholder="Email Address"
                            required
                            class="w-full px-5 py-4
                                   rounded-2xl
                                   bg-slate-100
                                   dark:bg-slate-800
                                   text-slate-900
                                   dark:text-white
                                   placeholder:text-slate-400
                                   dark:placeholder:text-slate-500
                                   border border-slate-200
                                   dark:border-white/10
                                   focus:outline-none
                                   focus:ring-2
                                   focus:ring-violet-500/50">

                        <!-- Password -->
                        <input
                            type="password"
                            placeholder="Password"
                            required
                            class="w-full px-5 py-4
                                   rounded-2xl
                                   bg-slate-100
                                   dark:bg-slate-800
                                   text-slate-900
                                   dark:text-white
                                   placeholder:text-slate-400
                                   dark:placeholder:text-slate-500
                                   border border-slate-200
                                   dark:border-white/10
                                   focus:outline-none
                                   focus:ring-2
                                   focus:ring-violet-500/50">

                        <!-- Remember -->
                        <div class="flex items-center justify-between">

                            <label class="flex items-center gap-2
                                          text-slate-600
                                          dark:text-slate-400">

                                <input type="checkbox"
                                       class="w-4 h-4
                                              rounded
                                              border-slate-300
                                              text-violet-600
                                              focus:ring-violet-500">

                                Remember me

                            </label>

                            <a href="#"
                               class="text-violet-600
                                      hover:text-violet-700
                                      dark:text-violet-400
                                      dark:hover:text-violet-300
                                      font-semibold">

                                Forgot Password?

                            </a>

                        </div>
                        

                        <!-- Submit -->
                        <button
                            type="submit"
                            class="w-full
                                   inline-flex
                                   items-center
                                   justify-center
                                   gap-2
                                   px-6 py-4
                                   rounded-2xl
                                   bg-gradient-to-r
                                   from-violet-600
                                   to-purple-600
                                   text-white
                                   font-bold
                                   shadow-lg
                                   shadow-violet-500/30
                                   hover:scale-[1.02]
                                   transition-all">

                            <i class="fa-solid fa-right-to-bracket"></i>

                            Sign In

                        </button>

                    </form>

                    <!-- Footer -->
                    <div class="mt-8 text-center">

                        <p class="text-slate-500 dark:text-slate-400">

                            Don't have an account?

                            <a href="#"
                               class="font-bold text-violet-600 dark:text-violet-400">

                                Create Account

                            </a>

                        </p>

                    </div>

                </div>

            </div>

        </div>

    </div>

</section>
</body>
</html>
